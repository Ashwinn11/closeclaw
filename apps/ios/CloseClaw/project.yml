name: CloseClaw
options:
  minimumXcodeGenVersion: 2.41.0
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_NAME: CloseClaw
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  CloseClaw:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CloseClaw
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.closeclaw.ios
        INFOPLIST_FILE: CloseClaw/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: CloseClaw/Resources/CloseClaw.entitlements
    scheme:
      gatherCoverageData: false
